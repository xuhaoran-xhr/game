<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CYBER TERMINAL LOGIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-color: #05050A;
      --primary: #00F0FF; /* Cyber Blue */
      --primary-glow: rgba(0, 240, 255, 0.4);
      --secondary: #00FF41; /* Matrix Green */
      --secondary-glow: rgba(0, 255, 65, 0.4);
      --danger: #FF003C; /* Crimson Red */
      --danger-glow: rgba(255, 0, 60, 0.4);
      --panel-bg: rgba(5, 5, 10, 0.7);
      --text-main: #FFFFFF;
      --text-muted: #8892B0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-color);
      font-family: 'Share Tech Mono', monospace;
      color: var(--text-main);
      overflow: hidden;
      position: relative;
    }

    /* --- Cyber/Matrix Background Animation --- */
    .cyber-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-color: #000;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(0, 255, 65, 0.08), transparent 25%);
    }

    .matrix-grid {
      position: absolute;
      inset: 0;
      z-index: 1;
      background-image: 
        linear-gradient(rgba(0, 240, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      perspective: 1000px;
      transform-style: preserve-3d;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(40px) scale(1.05); }
    }

    /* CRT Scanlines Overlay */
    .scanlines {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0) 50%,
        rgba(0,0,0,0.2) 50%,
        rgba(0,0,0,0.2)
      );
      background-size: 100% 4px;
      opacity: 0.3;
    }

    /* CRT Flicker */
    body::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      border: 2px solid rgba(0,240,255,0.1);
      right: 0;
      background: rgba(18, 16, 16, 0.1);
      opacity: 0;
      z-index: 11;
      pointer-events: none;
      animation: flicker 0.15s infinite;
    }
    @keyframes flicker {
      0% { opacity: 0.02; }
      50% { opacity: 0.05; }
      100% { opacity: 0.02; }
    }

    /* --- 登录卡片 HUD 风格 --- */
    .login-card {
      width: 480px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.3);
      padding: 50px 40px 40px;
      position: relative;
      z-index: 5;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8),
                  inset 0 0 20px rgba(0, 240, 255, 0.05);
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
    }

    /* HUD 角边框装饰 */
    .login-card::before, .login-card::after {
      content: ''; position: absolute; width: 20px; height: 20px;
      border-color: var(--primary); border-style: solid;
      pointer-events: none;
    }
    .login-card::before {
      top: 0; left: 0; border-width: 2px 0 0 2px;
    }
    .login-card::after {
      top: 0; right: 0; border-width: 2px 2px 0 0;
    }

    .deco-number {
      position: absolute; top: 16px; right: 24px;
      font-family: 'Orbitron', sans-serif;
      font-size: 60px; font-weight: 900; color: rgba(0, 240, 255, 0.08);
      line-height: 1; pointer-events: none; letter-spacing: 2px;
    }

    .login-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px; font-weight: 900; color: var(--text-main);
      text-transform: uppercase; letter-spacing: 6px; margin-bottom: 8px;
      text-shadow: 0 0 10px var(--primary-glow);
    }
    .login-title .glitch-accent { color: var(--primary); }
    
    .login-subtitle {
      font-size: 13px; font-weight: 400; text-transform: uppercase;
      letter-spacing: 4px; color: var(--primary); margin-bottom: 40px;
      display: flex; align-items: center; gap: 8px;
    }
    .login-subtitle::before {
      content: ''; display: inline-block; width: 12px; height: 12px;
      background-color: var(--primary); animation: blink 1s infinite alternate;
    }
    @keyframes blink { 0% { opacity: 0.3; } 100% { opacity: 1; box-shadow: 0 0 8px var(--primary); } }

    /* --- 输入框 --- */
    .input-group { margin-bottom: 28px; position: relative; }
    .input-group label {
      display: block; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2px;
      color: var(--text-muted); margin-bottom: 8px;
    }
    .input-wrapper {
      position: relative;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 240, 255, 0.2);
      transition: all 0.3s;
    }
    .input-wrapper::before {
      content: '>'; position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 16px; font-weight: bold;
      transition: color 0.3s;
    }
    
    .input-group input {
      width: 100%; height: 48px; padding: 0 40px 0 36px;
      border: none; border-radius: 0;
      font-size: 16px; font-family: 'Share Tech Mono', monospace;
      color: var(--text-main); background: transparent;
      outline: none; transition: all 0.3s;
    }
    .input-group input:focus {
      background: rgba(0, 240, 255, 0.05);
      border-color: var(--primary);
      box-shadow: inset 0 0 10px var(--primary-glow);
    }
    /* Change > color on focus */
    .input-wrapper:focus-within { border-color: var(--primary); }
    .input-wrapper:focus-within::before { color: var(--primary); text-shadow: 0 0 5px var(--primary); }

    .input-group input::placeholder { color: rgba(255,255,255,0.2); }
    .input-wrapper.error { border-color: var(--danger); }
    .input-wrapper.error::before { color: var(--danger); text-shadow: 0 0 5px var(--danger); }

    .error-msg {
      font-size: 11px; color: var(--danger); text-shadow: 0 0 5px var(--danger-glow);
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 8px; display: none;
    }
    .error-msg.show { display: block; animation: errorFlicker 0.2s 3; }
    @keyframes errorFlicker { 0% {opacity:0;} 50% {opacity:1;} 100% {opacity:0;} }

    .toggle-password {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; font-size: 16px;
      cursor: pointer; color: var(--text-muted); transition: color 0.2s;
    }
    .toggle-password:hover { color: var(--primary); text-shadow: 0 0 5px var(--primary); }

    /* --- 选项 --- */
    .form-options {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 36px;
    }
    .remember-me {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); cursor: pointer;
    }
    /* Custom Cyber Checkbox */
    .remember-me input {
      appearance: none; width: 16px; height: 16px;
      border: 1px solid var(--text-muted); background: transparent;
      cursor: pointer; position: relative; transition: all 0.2s;
    }
    .remember-me input:checked {
      border-color: var(--primary); background: rgba(0, 240, 255, 0.2);
    }
    .remember-me input:checked::after {
      content: ''; position: absolute; top: 2px; left: 2px; width: 10px; height: 10px;
      background: var(--primary); box-shadow: 0 0 5px var(--primary);
    }

    .forgot-link {
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--primary); text-decoration: none;
      transition: all 0.2s;
    }
    .forgot-link:hover { text-shadow: 0 0 8px var(--primary); letter-spacing: 2px; }

    /* --- 登录按钮 --- */
    .login-btn {
      width: 100%; height: 50px;
      border: 1px solid var(--primary);
      background: rgba(0, 240, 255, 0.1); color: var(--primary);
      font-size: 16px; font-weight: 700; font-family: 'Orbitron', sans-serif;
      text-transform: uppercase; letter-spacing: 6px;
      cursor: pointer; transition: all 0.2s; position: relative;
      overflow: hidden;
    }
    .login-btn::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.4), transparent);
      transition: left 0.4s;
    }
    .login-btn:hover {
      background: rgba(0, 240, 255, 0.25);
      box-shadow: 0 0 15px var(--primary-glow);
    }
    .login-btn:hover::before { left: 100%; }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled {
      border-color: var(--text-muted); color: var(--text-muted);
      background: transparent; box-shadow: none; cursor: not-allowed;
    }

    .login-btn .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid var(--text-muted); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 12px;
    }

    /* --- 分割线 --- */
    .divider {
      display: flex; align-items: center; margin: 30px 0; gap: 16px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1);
    }
    .divider span {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 2px; color: var(--text-muted);
    }

    /* --- 社交按钮 --- */
    .social-login { display: flex; gap: 12px; }
    .social-btn {
      flex: 1; height: 40px; border: 1px solid rgba(255,255,255,0.1);
      background: transparent; cursor: pointer; color: var(--text-muted);
      transition: all 0.2s; font-family: 'Orbitron', sans-serif;
    }
    .social-btn:hover {
      border-color: var(--secondary); color: var(--secondary);
      box-shadow: 0 0 10px var(--secondary-glow);
      background: rgba(0, 255, 65, 0.1);
    }

    .signup-link {
      text-align: center; margin-top: 32px;
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted);
    }
    .signup-link a {
      color: var(--secondary); text-decoration: none;
      transition: text-shadow 0.2s;
    }
    .signup-link a:hover { text-shadow: 0 0 8px var(--secondary-glow); }

    /* --- Toast 系统提示 --- */
    .toast {
      position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-100px);
      padding: 16px 24px; border: 1px solid var(--primary);
      font-size: 13px; font-family: 'Share Tech Mono', monospace;
      text-transform: uppercase; letter-spacing: 2px; z-index: 999;
      background: rgba(0,240,255,0.1); color: var(--primary);
      backdrop-filter: blur(8px); box-shadow: 0 0 15px var(--primary-glow);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
    }
    .toast::before {
      content: '[SYSMSG] '; font-weight: bold; opacity: 0.7;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--secondary); color: var(--secondary); background: rgba(0,255,65,0.1); box-shadow: 0 0 15px var(--secondary-glow); }
    .toast.error { border-color: var(--danger); color: var(--danger); background: rgba(255,0,60,0.1); box-shadow: 0 0 15px var(--danger-glow); }
  </style>
</head>
<body>

<!-- Cyberpunk Background Layers -->
<div class="cyber-bg"></div>
<div class="matrix-grid"></div>
<div class="scanlines"></div>

<div class="toast" id="toast"></div>

<div class="login-card">
  <div class="deco-number">01</div>

  <!-- 登录表单 -->
  <div class="form-section" id="formSection">
    <h1 class="login-title">LOGIN<span class="glitch-accent">_</span></h1>
    <p class="login-subtitle">SECURE TERMINAL ACCESS</p>

    <form id="loginForm">
      <div class="input-group">
        <label>OPERATIVE ID</label>
        <div class="input-wrapper" id="emailWrapper">
          <input type="email" id="emailInput" placeholder="agent@neon-ops.sys" required autocomplete="off">
        </div>
        <div class="error-msg" id="emailError">INVALID IDENTITY CREDENTIALS</div>
      </div>

      <div class="input-group">
        <label>ACCESS KEY</label>
        <div class="input-wrapper" id="pwdWrapper">
          <input type="password" id="passwordInput" placeholder="••••••••" required minlength="6">
          <button type="button" class="toggle-password" id="togglePwd">[ SHOW ]</button>
        </div>
        <div class="error-msg" id="pwdError">ACCESS KEY MUST BE >= 6 CHARS</div>
      </div>

      <div class="form-options">
        <label class="remember-me"><input type="checkbox" id="rememberMe"> MAINTAIN LINK</label>
        <a href="#" class="forgot-link">RECOVER KEY</a>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">INITIALIZE LINK</button>
    </form>

    <div class="divider"><span>EXTERNAL PROTOCOLS</span></div>
    <div class="social-login">
      <button class="social-btn" onclick="showToast('PROTOCOL UNAVAILABLE','error')">G-NET</button>
      <button class="social-btn" onclick="showToast('PROTOCOL UNAVAILABLE','error')">A-NET</button>
      <button class="social-btn" onclick="showToast('PROTOCOL UNAVAILABLE','error')">T-NET</button>
    </div>
    <div class="signup-link">UNREGISTERED? <a href="#">REQUEST CLEARANCE</a></div>
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const loginBtn = document.getElementById('loginBtn');
  const togglePwd = document.getElementById('togglePwd');
  const emailError = document.getElementById('emailError');
  const pwdError = document.getElementById('pwdError');
  const rememberMe = document.getElementById('rememberMe');
  const formSection = document.getElementById('formSection');
  const welcomePage = document.getElementById('welcomePage');
  const toast = document.getElementById('toast');

  // 页面加载：检查是否已登录
  window.addEventListener('DOMContentLoaded', () => {
    // 记住的账号
    const remembered = localStorage.getItem('rememberedEmail');
    if (remembered) {
      emailInput.value = remembered;
      rememberMe.checked = true;
    }
  });

  // Toast 消息
  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // 密码可见切换
  let pwdVis = false;
  togglePwd.addEventListener('click', () => {
    pwdVis = !pwdVis;
    passwordInput.type = pwdVis ? 'text' : 'password';
    togglePwd.textContent = pwdVis ? '[ HIDE ]' : '[ SHOW ]';
  });

  // 清除错误
  const emailWrapper = document.getElementById('emailWrapper');
  const pwdWrapper = document.getElementById('pwdWrapper');

  emailInput.addEventListener('input', () => {
    emailWrapper.classList.remove('error');
    emailError.classList.remove('show');
  });
  passwordInput.addEventListener('input', () => {
    pwdWrapper.classList.remove('error');
    pwdError.classList.remove('show');
  });

  // 表单提交
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let valid = true;

    // 验证邮箱
    const emailVal = emailInput.value.trim();
    if (!emailVal || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
      emailWrapper.classList.add('error');
      emailError.classList.add('show');
      valid = false;
    }

    // 验证密码
    const pwdVal = passwordInput.value;
    if (!pwdVal || pwdVal.length < 6) {
      pwdWrapper.classList.add('error');
      pwdError.classList.add('show');
      valid = false;
    }

    if (!valid) return;

    // 模拟登录请求
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> AUTHENTICATING...';

    await new Promise(r => setTimeout(r, 1500));

    // 记住我
    if (rememberMe.checked) {
      localStorage.setItem('rememberedEmail', emailVal);
    } else {
      localStorage.removeItem('rememberedEmail');
    }

    // 登录成功
    localStorage.setItem('loggedInUser', emailVal);
    showToast('AUTHORIZATION GRANTED', 'success');

    loginBtn.disabled = false;
    loginBtn.innerHTML = 'INITIALIZE LINK';

    setTimeout(() => window.location.href = 'index.html', 800);
  });
</script>
</body>
</html>
