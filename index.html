<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRUTALIST LOGIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Brutalist Luxury Light (Adjusted for non-pure colors) */
      --bg: #F7F4F0;         /* Warm cream background instead of pure white */
      --fg: #1D1C1A;         /* Deep charcoal instead of pure black */
      --gold: #D4B886;       /* Muted luxury gold */
      --card: #FCFBF9;       /* Off-white for cards */
      --gray: #8A8884;       /* Warm gray for secondary text */
      --deco: #E6E2DC;       /* Light decorative elements */
      --danger: #D15147;     /* Muted red */
      --success: #3A965E;    /* Muted green */
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      color: var(--fg);
      padding: 20px;
    }

    /* 登录卡片 */
    .login-card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 3px solid var(--fg);
      border-radius: 0;
      padding: 56px 48px;
      position: relative;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    
    .login-card:hover {
      transform: translate(-6px, -6px);
      box-shadow: 12px 12px 0 var(--fg);
    }

    .deco-number {
      position: absolute; 
      top: 24px; 
      right: 32px;
      font-size: 96px; 
      font-weight: 900; 
      color: var(--deco);
      line-height: 1; 
      pointer-events: none; 
      letter-spacing: -4px;
      z-index: 0;
    }

    .form-section {
      position: relative;
      z-index: 1;
    }

    .login-title {
      font-size: 42px; 
      font-weight: 900;
      text-transform: uppercase; 
      letter-spacing: 4px; 
      margin-bottom: 8px;
      color: var(--fg);
    }
    
    .login-subtitle {
      font-size: 13px; 
      font-weight: 700; 
      text-transform: uppercase;
      letter-spacing: 2px; 
      color: var(--gray); 
      margin-bottom: 48px;
    }

    /* 输入框 */
    .input-group { 
      margin-bottom: 28px; 
      position: relative; 
    }
    
    .input-group label {
      display: block; 
      font-size: 12px; 
      font-weight: 900;
      text-transform: uppercase; 
      letter-spacing: 2px;
      color: var(--gray); 
      margin-bottom: 12px;
    }
    
    .input-wrapper { position: relative; }
    
    .input-group input {
      width: 100%; 
      height: 56px; 
      padding: 0 50px 0 20px;
      border: 3px solid var(--fg); 
      border-radius: 0;
      font-size: 16px; 
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: var(--fg); 
      background: var(--bg);
      outline: none; 
      transition: all 0.15s ease;
    }
    
    .input-group input:focus {
      background: var(--card);
      box-shadow: 6px 6px 0 var(--gold);
      transform: translate(-2px, -2px);
    }
    
    .input-group input::placeholder { 
      color: #C0BEB8; 
      font-weight: 400;
    }
    
    .input-group input.error { 
      border-color: var(--danger); 
    }

    .error-msg {
      font-size: 11px; 
      font-weight: 700; 
      color: var(--danger);
      text-transform: uppercase; 
      letter-spacing: 1px;
      margin-top: 8px; 
      display: none;
    }
    
    .error-msg.show { display: block; }

    .toggle-password {
      position: absolute; 
      right: 16px; 
      top: 50%; 
      transform: translateY(-50%);
      background: none; 
      border: none; 
      font-size: 18px;
      cursor: pointer; 
      color: var(--gray);
      transition: color 0.15s ease;
    }
    
    .toggle-password:hover { color: var(--gold); }

    /* 选项 */
    .form-options {
      display: flex; 
      justify-content: space-between;
      align-items: center; 
      margin-bottom: 40px;
    }
    
    .remember-me {
      display: flex; 
      align-items: center; 
      gap: 10px;
      font-size: 12px; 
      font-weight: 700; 
      text-transform: uppercase;
      letter-spacing: 1px; 
      color: var(--gray); 
      cursor: pointer;
    }
    
    .remember-me input { 
      width: 20px; 
      height: 20px; 
      accent-color: var(--fg); 
      border: 2px solid var(--fg);
      border-radius: 0;
    }
    
    .forgot-link {
      font-size: 12px; 
      font-weight: 700; 
      text-transform: uppercase;
      letter-spacing: 1px; 
      color: var(--fg); 
      text-decoration: none;
      border-bottom: 3px solid var(--gold); 
      padding-bottom: 2px;
      transition: all 0.15s ease;
    }
    
    .forgot-link:hover { 
      background: var(--gold); 
    }

    /* 登录按钮 */
    .login-btn {
      width: 100%; 
      height: 64px; 
      border: 3px solid var(--fg);
      border-radius: 0; 
      background: var(--fg); 
      color: var(--card);
      font-size: 16px; 
      font-weight: 900; 
      font-family: 'Inter', sans-serif;
      text-transform: uppercase; 
      letter-spacing: 4px;
      cursor: pointer; 
      transition: all 0.15s ease;
    }
    
    .login-btn:hover {
      background: var(--gold); 
      border-color: var(--gold); 
      color: var(--fg);
      transform: translate(-4px, -4px); 
      box-shadow: 8px 8px 0 var(--fg);
    }
    
    .login-btn:active { 
      transform: translate(0,0); 
      box-shadow: none; 
    }
    
    .login-btn:disabled {
      background: var(--gray);
      border-color: var(--gray);
      color: var(--bg);
      cursor: not-allowed;
      transform: none !important; 
      box-shadow: none !important;
    }

    /* 加载动画 */
    .login-btn .spinner {
      display: inline-block; 
      width: 20px; 
      height: 20px;
      border: 3px solid var(--card); 
      border-top-color: transparent;
      border-radius: 50%; 
      animation: spin 0.6s linear infinite;
      vertical-align: middle; 
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 分割线 */
    .divider {
      display: flex; 
      align-items: center; 
      margin: 36px 0; 
      gap: 20px;
    }
    
    .divider::before, .divider::after {
      content: ''; 
      flex: 1; 
      height: 3px; 
      background: var(--deco);
    }
    
    .divider span {
      font-size: 12px; 
      font-weight: 900; 
      text-transform: uppercase;
      letter-spacing: 3px; 
      color: var(--gray);
    }

    /* 社交按钮 */
    .social-login { 
      display: flex; 
      gap: 16px; 
    }
    
    .social-btn {
      flex: 1; 
      height: 56px; 
      border: 3px solid var(--fg);
      border-radius: 0; 
      background: var(--card);
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 8px;
      cursor: pointer; 
      font-family: 'Inter', sans-serif;
      font-size: 13px; 
      font-weight: 900; 
      text-transform: uppercase;
      letter-spacing: 2px; 
      color: var(--fg); 
      transition: all 0.15s ease;
    }
    
    .social-btn:hover {
      background: var(--fg); 
      color: var(--card);
      transform: translate(-4px, -4px); 
      box-shadow: 6px 6px 0 var(--gold);
    }

    .signup-link {
      text-align: center; 
      margin-top: 32px;
      font-size: 13px; 
      font-weight: 700; 
      text-transform: uppercase;
      letter-spacing: 1px; 
      color: var(--gray);
    }
    
    .signup-link a {
      color: var(--fg); 
      text-decoration: none;
      font-weight: 900;
      border-bottom: 3px solid var(--gold); 
      padding-bottom: 2px;
      margin-left: 8px;
      transition: all 0.15s ease;
    }
    
    .signup-link a:hover { 
      background: var(--gold); 
    }

    /* Toast 消息 */
    .toast {
      position: fixed; 
      top: 40px; 
      left: 50%; 
      transform: translateX(-50%) translateY(-150px);
      padding: 18px 36px; 
      border: 3px solid var(--fg);
      background: var(--card);
      font-size: 14px; 
      font-weight: 900; 
      text-transform: uppercase;
      letter-spacing: 2px; 
      z-index: 999;
      box-shadow: 8px 8px 0 var(--fg);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .toast.show { 
      transform: translateX(-50%) translateY(0); 
    }
    
    .toast.success { 
      background: var(--success); 
      color: var(--card); 
      border-color: var(--fg); 
    }
    
    .toast.error { 
      background: var(--danger); 
      color: var(--card); 
      border-color: var(--fg); 
    }

    /* 响应式 */
    @media (max-width: 540px) {
      .login-card { 
        padding: 40px 24px; 
      }
      .deco-number {
        font-size: 72px;
        top: 16px;
        right: 16px;
      }
      .login-title {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="login-card">
  <div class="deco-number">01</div>

  <!-- 登录表单 -->
  <div class="form-section" id="formSection">
    <h1 class="login-title">LOGIN</h1>
    <p class="login-subtitle">SIGN IN TO YOUR ACCOUNT</p>

    <form id="loginForm">
      <div class="input-group">
        <label>EMAIL ADDRESS</label>
        <div class="input-wrapper">
          <input type="email" id="emailInput" placeholder="hello@example.com" required>
        </div>
        <div class="error-msg" id="emailError">PLEASE ENTER A VALID EMAIL</div>
      </div>

      <div class="input-group">
        <label>PASSWORD</label>
        <div class="input-wrapper">
          <input type="password" id="passwordInput" placeholder="••••••••" required minlength="6">
          <button type="button" class="toggle-password" id="togglePwd">👁</button>
        </div>
        <div class="error-msg" id="pwdError">PASSWORD MUST BE AT LEAST 6 CHARACTERS</div>
      </div>

      <div class="form-options">
        <label class="remember-me"><input type="checkbox" id="rememberMe"> REMEMBER</label>
        <a href="#" class="forgot-link">FORGOT?</a>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">SIGN IN →</button>
    </form>

    <div class="divider"><span>OR</span></div>
    <div class="social-login">
      <button class="social-btn" onclick="showToast('GOOGLE LOGIN COMING SOON','error')">G</button>
      <button class="social-btn" onclick="showToast('APPLE LOGIN COMING SOON','error')">◆</button>
      <button class="social-btn" onclick="showToast('WECHAT LOGIN COMING SOON','error')">💬</button>
    </div>
    <div class="signup-link">NO ACCOUNT? <a href="#">REGISTER NOW</a></div>
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const loginBtn = document.getElementById('loginBtn');
  const togglePwd = document.getElementById('togglePwd');
  const emailError = document.getElementById('emailError');
  const pwdError = document.getElementById('pwdError');
  const rememberMe = document.getElementById('rememberMe');
  const formSection = document.getElementById('formSection');
  const welcomePage = document.getElementById('welcomePage');
  const toast = document.getElementById('toast');

  // 页面加载：检查是否已登录
  window.addEventListener('DOMContentLoaded', () => {
    // 记住的账号
    const remembered = localStorage.getItem('rememberedEmail');
    if (remembered) {
      emailInput.value = remembered;
      rememberMe.checked = true;
    }
  });

  // Toast 消息
  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = 'toast ' + type;
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // 密码可见切换
  let pwdVis = false;
  togglePwd.addEventListener('click', () => {
    pwdVis = !pwdVis;
    passwordInput.type = pwdVis ? 'text' : 'password';
    togglePwd.textContent = pwdVis ? '🙈' : '👁';
  });

  // 清除错误
  emailInput.addEventListener('input', () => {
    emailInput.classList.remove('error');
    emailError.classList.remove('show');
  });
  passwordInput.addEventListener('input', () => {
    passwordInput.classList.remove('error');
    pwdError.classList.remove('show');
  });

  // 表单提交
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    let valid = true;

    // 验证邮箱
    const emailVal = emailInput.value.trim();
    if (!emailVal || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
      emailInput.classList.add('error');
      emailError.classList.add('show');
      valid = false;
    }

    // 验证密码
    const pwdVal = passwordInput.value;
    if (!pwdVal || pwdVal.length < 6) {
      passwordInput.classList.add('error');
      pwdError.classList.add('show');
      valid = false;
    }

    if (!valid) return;

    // 模拟登录请求
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> AUTHENTICATING...';

    await new Promise(r => setTimeout(r, 1500));

    // 记住我
    if (rememberMe.checked) {
      localStorage.setItem('rememberedEmail', emailVal);
    } else {
      localStorage.removeItem('rememberedEmail');
    }

    // 登录成功
    localStorage.setItem('loggedInUser', emailVal);
    showToast('LOGIN SUCCESSFUL', 'success');

    loginBtn.disabled = false;
    loginBtn.innerHTML = 'SIGN IN →';

    setTimeout(() => window.location.href = 'game.html', 600);
  });
</script>
</body>
</html>
